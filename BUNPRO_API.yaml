  /search/v1_1:
    post:
      tags:
        - Search
      summary: Search
      description: Search for content
      operationId: search
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
            example:
              query: "string"
      responses:
        '200':
          description: Successful response
          content:
