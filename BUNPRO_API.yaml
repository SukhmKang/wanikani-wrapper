openapi: 3.0.0
info:
  title: Bunpro Community API
  version: 1.0.1
  description: |
    A community-maintained reverse-engineered API reference for Bunpro, a spaced repetition system for learning Japanese grammar.
  contact:
    name: Bunpro Community API
    url: https://github.com/cbullard-dev/bunpro-community-api
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.bunpro.jp/api/frontend
    description: Bunpro Frontend API Server

security:
  - bearerAuth: []

paths:
  /user:
    get:
      tags:
        - User
      summary: Get User
      description: Retrieve the current user's information
      operationId: getUser
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                {
                  "user": {
                    "data": {
                      "id": "12345",
                      "type": "user",
                      "attributes": {
                        "id": 12345,
                        "username": "NotARealUser",
                        "level": 34,
                        "xp": 64043,
                        "is_lifetime": false
                      }
                    }
                  },
                  "active_cosmetics": {
                    "data": []
                  },
                  "active_title": null
                }

        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/user_furigana:
    get:
      tags:
        - User
      summary: Get User Furigana
      description: Retrieve the user's furigana settings
      operationId: getUserFurigana
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/add_known_kanji:
    post:
      tags:
        - User
      summary: Add Known Kanji
      description: Add kanji to the user's known kanji list
      operationId: addKnownKanji
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - kanji
              properties:
                kanji:
                  type: string
                  description: The kanji character(s) to add
                  example: "漢"
            example:
              kanji: "漢"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/remove_known_kanji:
    delete:
      tags:
        - User
      summary: Remove Known Kanji
      description: Remove kanji from the user's known kanji list
      operationId: removeKnownKanji
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - kanji
              properties:
                kanji:
                  type: string
                  description: The kanji character(s) to remove
                  example: "漢"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/due:
    get:
      tags:
        - User
      summary: Get Due
      description: Retrieve items due for review
      operationId: getDue
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/queue:
    get:
      tags:
        - User
      summary: Get Queue
      description: Retrieve the user's review queue
      operationId: getQueue
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bookmarks:
    post:
      tags:
        - Bookmarks
      summary: Add Bookmark
      description: Add a new bookmark
      operationId: addBookmark
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '201':
          description: Bookmark created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /bookmarks/{bookmarkId}:
    delete:
      tags:
        - Bookmarks
      summary: Delete Bookmark
      description: Delete a bookmark by ID
      operationId: deleteBookmark
      parameters:
        - name: bookmarkId
          in: path
          required: true
          description: The ID of the bookmark to delete
          schema:
            type: string
          example: "12345"
      responses:
        '200':
          description: Bookmark deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericObject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /completed_readings:
    patch:
      tags:
        - Completed Readings
      summary: Completed Readings
      description: Update completed readings
      operationId: completedReadings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenericObject'
      responses:
        '200':
          description: Successful response
          content:
