components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Use the Frontend API Token obtained from the browser console.
        Token reference: vault:FRONTEND_API_TOKEN

  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Error message
            example:
              error: "Invalid request parameters"

    Unauthorized:
      description: Unauthorized - missing or invalid authentication token
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Error message
            example:
              error: "Authentication required"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Error message
            example:
              error: "Resource not found"

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                description: Error message
            example:
              error: "Internal server error"

  schemas:
    GenericObject:
      type: object
      description: Generic response object
      additionalProperties: true

    User:
      type: object
      properties:
        user:
          type: object
          properties:
            data:
              type: object
              properties:
                id:
                  type: string
                  example: '12345'
                type:
                  type: string
                  example: 'user'
                attributes:
                  $ref: '#/components/schemas/UserAttributes'
        active_cosmetics:
          type: object
          properties:
            attributes:
              $ref: '#/components/schemas/ActiveCosmetics'

    UserAttributes:
      type: object
      properties:
        add_spacing_to_sentences:
          type: boolean
          example: false
        admin:
          type: boolean
          example: false
        audio_speed:
          type: integer
          example: 75
        auto_expand_info:
          type: string
          example: 'Off'
        auto_highlight_errors_in_answer:
          type: string
          example: 'On'
        auto_play_review_audio:
          type: string
          example: 'On'
        buncoin:
          type: integer
          example: 10000
        bunny_mode:
          type: string
          example: 'Off'
        browser_theme_sync:
          type: string
          example: 'Off'
        casual_formal_focus:
          type: string
          example: 'Casual'
        created_at:
          type: string
          format: date-time
          example: '2025-06-16T22:34:42.092Z'
        display_review_srs:
          type: string
          example: 'Show'
        enable_color_blind_assistance:
          type: string
          example: 'Off'
        favorite_badge:
          type: string
          example: ''
        feedback_notification:
          type: boolean
          example: false
        finished_onboarding:
          type: boolean
          example: true
        focus_reviews:
          type: string
          example: 'Off'
        font_sizing:
          type: string
